<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClearUp sin conexión</title>
    <meta name="theme-color" content="#157a6e" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(21, 122, 110, 0.18), transparent 24rem),
          linear-gradient(180deg, #f6fbfb, #edf7f7);
        color: #16313a;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        width: min(32rem, calc(100% - 2rem));
        border: 1px solid rgba(108, 142, 152, 0.18);
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.86);
        padding: 2rem;
        box-shadow: 0 24px 60px rgba(14, 42, 51, 0.08);
      }

      .logo {
        display: inline-grid;
        place-items: center;
        width: 3rem;
        height: 3rem;
        border-radius: 1rem;
        background: linear-gradient(135deg, #157a6e, #115e58);
        color: white;
        font-size: 1.4rem;
        font-weight: 900;
      }

      h1 {
        margin: 1.2rem 0 0.6rem;
        font-size: clamp(2rem, 8vw, 3.2rem);
        line-height: 0.95;
      }

      p {
        color: #647985;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">C</div>
      <h1>Sin conexión</h1>
      <p>ClearUp no puede cargar nuevos datos ahora. Revisa tu conexión e intenta nuevamente.</p>
    </main>
  </body>
</html>
